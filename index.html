<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0d0d11">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Training Log</title>
<link rel="manifest" href="./manifest.json">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:#0d0d11;color:#f0f0f5;font-family:'Inter','Helvetica Neue',sans-serif;min-height:100vh;font-size:16px;}
input,button,select{font-family:inherit;font-size:16px;}

/* スクロールバー */
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:#0d0d11;}
::-webkit-scrollbar-thumb{background:#2a2a3a;border-radius:2px;}

/* レイアウト */
#app{display:flex;flex-direction:column;min-height:100vh;}
#header{padding:14px 16px;border-bottom:1px solid #2a2a3a;display:flex;align-items:center;gap:10px;background:#0d0d11;position:sticky;top:0;z-index:100;}
#header-bar{width:5px;height:28px;background:linear-gradient(180deg,#7c6af7,#4ade80);border-radius:3px;flex-shrink:0;}
#header-title{font-size:17px;font-weight:800;letter-spacing:-0.5px;color:#f0f0f5;}
#header-sub{font-size:13px;color:#c8c8e0;margin-top:1px;}
#header-date{margin-left:auto;font-size:14px;color:#c8c8e0;background:#1a1a25;padding:5px 10px;border-radius:8px;}

/* タブバー */
#tabbar{display:flex;border-bottom:1px solid #2a2a3a;background:#0d0d11;position:sticky;top:59px;z-index:99;}
.tab-btn{flex:1;padding:13px 0;background:none;border:none;border-bottom:2px solid transparent;color:#b0b0c8;font-size:13px;font-weight:400;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:3px;}
.tab-btn svg{opacity:.5;transition:opacity .15s;}
.tab-btn.active{color:#f0f0f5;font-weight:700;border-bottom-color:#7c6af7;}
.tab-btn.active svg{opacity:1;}

/* コンテンツ */
#content{flex:1;overflow-y:auto;padding-bottom:30px;}
.tab-pane{display:none;padding:16px;}
.tab-pane.active{display:block;}

/* カード */
.card{background:#1e1e2e;border:1px solid #2a2a3a;border-radius:14px;padding:15px 16px;margin-bottom:12px;}
.card-label{font-size:13px;color:#c8c8e0;letter-spacing:.5px;margin-bottom:10px;text-transform:uppercase;font-weight:600;}

/* ボタン */
.btn-primary{width:100%;padding:15px;background:linear-gradient(135deg,#7c6af7,#a78bfa);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;letter-spacing:-.2px;}
.btn-primary:active{opacity:.85;}
.btn-primary:disabled{background:#2a2a3a;color:#c8c8e0;cursor:not-allowed;}
.btn-green{background:linear-gradient(135deg,#4ade80,#22c55e);color:#0d0d11;}
.btn-sm{padding:8px 14px;border-radius:8px;border:1px solid #2a2a3a;background:#1e1e2e;color:#c0c0d0;font-size:14px;cursor:pointer;}
.btn-danger{background:none;border:none;color:#c8c8e0;cursor:pointer;font-size:20px;padding:0 6px;line-height:1;}

/* ステッパー */
.stepper{display:flex;align-items:center;gap:8px;}
.stepper-btn{width:36px;height:36px;border-radius:9px;border:1px solid #3a3a4a;background:#0d0d11;color:#e0e0f0;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;}
.stepper-val{min-width:36px;text-align:center;font-size:20px;font-weight:700;color:#f0f0f5;}

/* Day セレクタ */
.day-selector{display:flex;gap:8px;margin-bottom:16px;}
.day-btn{flex:1;padding:12px 4px;border-radius:11px;border:1px solid #2a2a3a;background:#1e1e2e;color:#c8c8e0;font-size:13px;font-weight:400;cursor:pointer;text-align:center;transition:all .15s;}
.day-btn.active{border-color:#7c6af7;background:#1e1b3a;color:#a78bfa;font-weight:700;}

/* 種目行 */
.ex-row{background:#0d0d11;border:1px solid #2a2a3a;border-radius:11px;padding:13px 14px;margin-bottom:9px;}
.ex-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:11px;}
.ex-name{font-size:17px;font-weight:700;color:#f0f0f5;}
.ex-note{font-size:13px;color:#c8c8e0;margin-top:2px;}
.ex-controls{display:flex;gap:20px;align-items:center;}
.ex-ctrl-label{font-size:14px;color:#c8c8e0;margin-bottom:6px;font-weight:600;}
.ex-volume{margin-left:auto;text-align:right;}
.ex-volume-num{font-size:24px;font-weight:800;color:#a78bfa;}
.ex-volume-label{font-size:14px;color:#c8c8e0;font-weight:600;}

/* 入力フィールド */
.add-row{display:flex;gap:8px;margin-bottom:16px;}
.input-field{flex:1;background:#1e1e2e;border:1.5px solid #3a3a4a;border-radius:10px;padding:12px 14px;color:#f0f0f5;font-size:16px;outline:none;}
.input-field:focus{border-color:#7c6af7;}
.input-field::placeholder{color:#7070a0;}

/* 食事タブ - カメラ/アルバムボタン */
.meal-action-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.meal-action-btn{padding:18px 10px;border-radius:14px;border:1.5px solid #2a2a3a;background:#1e1e2e;color:#f0f0f5;cursor:pointer;text-align:center;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:8px;}
.meal-action-btn:active{background:#2a2a3a;}
.meal-action-btn svg{color:#7c6af7;}
.meal-action-btn span{font-size:14px;font-weight:600;}
.meal-action-btn small{font-size:13px;color:#c8c8e0;}

/* プレビュー */
.preview-wrap{border-radius:12px;overflow:hidden;margin-bottom:12px;position:relative;background:#1e1e2e;}
.preview-wrap img{width:100%;display:block;max-height:280px;object-fit:cover;}
.preview-change{position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,.7);color:#f0f0f5;border:none;border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;}

/* 確認ダイアログ */
.dialog-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:flex;align-items:flex-end;justify-content:center;}
.dialog-box{background:#1e1e2e;border-radius:20px 20px 0 0;padding:24px 20px;width:100%;max-width:480px;}
.dialog-title{font-size:17px;font-weight:700;text-align:center;margin-bottom:8px;color:#f0f0f5;}
.dialog-sub{font-size:14px;color:#c8c8e0;text-align:center;margin-bottom:20px;}
.dialog-img{width:100%;border-radius:10px;margin-bottom:16px;max-height:200px;object-fit:cover;}
.dialog-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.dialog-cancel{padding:14px;border-radius:10px;border:1px solid #2a2a3a;background:#0d0d11;color:#c0c0d0;font-size:15px;cursor:pointer;font-weight:600;}
.dialog-ok{padding:14px;border-radius:10px;border:none;background:linear-gradient(135deg,#4ade80,#22c55e);color:#0d0d11;font-size:15px;cursor:pointer;font-weight:700;}

/* PFCバー */
.pbar-wrap{margin-bottom:9px;}
.pbar-header{display:flex;justify-content:space-between;margin-bottom:7px;}
.pbar-label{font-size:13px;color:#c0c0d0;}
.pbar-val{font-size:15px;font-weight:700;color:#f0f0f5;}
.pbar-track{height:6px;background:#2a2a3a;border-radius:3px;overflow:hidden;}
.pbar-fill{height:100%;border-radius:3px;}

/* カロリーヒーロー */
.cal-hero{display:flex;justify-content:space-between;align-items:center;}
.cal-num{font-size:42px;font-weight:800;letter-spacing:-2px;line-height:1;color:#f0f0f5;}
.cal-unit{font-size:14px;color:#c8c8e0;margin-left:5px;font-weight:400;}

/* 計測タブ */
.measure-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.measure-item label{display:block;font-size:14px;color:#c8c8e0;margin-bottom:7px;font-weight:600;}
.measure-input{width:100%;background:#0d0d11;border:1.5px solid #3a3a4a;border-radius:10px;padding:12px 14px;color:#f0f0f5;font-size:18px;outline:none;text-align:right;}
.measure-input:focus{border-color:#7c6af7;}
.measure-input::placeholder{color:#7070a0;}
.measure-item.full{grid-column:1/-1;}

/* グラフタブ */
.period-row{display:flex;gap:8px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px;}
.period-btn{flex-shrink:0;padding:9px 18px;border-radius:8px;border:1px solid #2a2a3a;background:#1e1e2e;color:#c8c8e0;font-size:14px;cursor:pointer;white-space:nowrap;}
.period-btn.active{border-color:#7c6af7;background:#1e1b3a;color:#a78bfa;font-weight:700;}
.chart-wrap{position:relative;height:190px;margin-bottom:4px;}

/* 履歴 */
.history-item{display:flex;justify-content:space-between;align-items:center;padding:13px 0;border-bottom:1px solid #2a2a3a;}
.history-item:last-child{border-bottom:none;}
.history-date{font-size:14px;color:#c0c0d8;}

/* タグ */
.tag-list{display:flex;flex-wrap:wrap;gap:7px;}
.tag{font-size:12px;padding:5px 11px;border-radius:20px;background:#1e1b3a;color:#a78bfa;border:1px solid #7c6af744;}

/* 結果グリッド */
.result-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px;}
.result-cell{background:#1e1e2e;border:1px solid #2a2a3a;border-radius:11px;padding:13px 10px;text-align:center;}
.result-cell-label{font-size:13px;color:#c8c8e0;margin-bottom:5px;}
.result-cell-val{font-size:22px;font-weight:800;line-height:1;color:#f0f0f5;}
.result-cell-unit{font-size:13px;color:#c8c8e0;margin-top:3px;}

/* アドバイスボックス */
.advice-box{background:#1e1b3a;border:1px solid #7c6af733;border-radius:12px;padding:14px 16px;margin-bottom:10px;}
.advice-label{font-size:13px;color:#a78bfa;margin-bottom:7px;letter-spacing:.5px;font-weight:700;}
.advice-text{font-size:15px;line-height:1.8;color:#f0f0ff;}
.meal-advice-box{background:#0f2218;border:1px solid #4ade8033;border-radius:12px;padding:14px 16px;margin-bottom:10px;}
.meal-advice-label{font-size:13px;color:#4ade80;margin-bottom:7px;letter-spacing:.5px;font-weight:700;}
.meal-advice-text{font-size:15px;line-height:1.8;color:#d0fde0;}

/* ローディング */
.loading-row{display:flex;align-items:center;gap:12px;padding:16px;background:#1e1e2e;border-radius:11px;color:#c8c8e0;font-size:14px;margin-top:10px;}
.spinner{width:20px;height:20px;border-radius:50%;border:2px solid #2a2a3a;border-top-color:#7c6af7;animation:spin .7s linear infinite;flex-shrink:0;}

/* エラー */
.error-box{padding:13px 15px;background:#1c1018;border:1px solid #450a0a;border-radius:10px;font-size:14px;color:#f87171;margin-top:10px;}

/* タンパク質評価 */
.protein-row{display:flex;align-items:center;gap:12px;}
.protein-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0;}

/* Claude送信ボタン */
.claude-btn{width:100%;padding:15px;background:#0d0d11;border:1.5px solid #7c6af7;border-radius:12px;color:#a78bfa;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:10px;}
.claude-btn:active{background:#1e1b3a;}

/* トースト */
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:#7c6af7;color:#fff;padding:11px 22px;border-radius:22px;font-size:14px;font-weight:600;opacity:0;transition:all .3s;pointer-events:none;z-index:999;white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* 注意書き */
.note-text{font-size:12px;color:#606080;text-align:center;padding:4px 0 8px;}

/* 体型ボックス */
.body-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.body-cell{background:#0d0d11;border:1px solid #2a2a3a;border-radius:10px;padding:13px;text-align:center;}
.body-cell-label{font-size:13px;color:#c8c8e0;margin-bottom:5px;}
.body-cell-val{font-size:24px;font-weight:800;}
.body-cell-unit{font-size:13px;color:#c8c8e0;}

@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div id="header-bar"></div>
    <div>
      <div id="header-title">TRAINING LOG</div>
      <div id="header-sub">筋トレ × 食事 × 計測</div>
    </div>
    <div id="header-date" id="hdate"></div>
  </div>

  <div id="tabbar">
    <button class="tab-btn active" onclick="switchTab('workout',this)">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#a78bfa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 6.5h11M6.5 17.5h11M3 12h18M7 3v4M17 3v4M7 17v4M17 17v4"/></svg>
      筋トレ
    </button>
    <button class="tab-btn" onclick="switchTab('meal',this)">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#4ade80" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l19-9-9 19-2-8-8-2z"/></svg>
      食事
    </button>
    <button class="tab-btn" onclick="switchTab('measure',this)">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 6H3M21 12H9M21 18H3M3 6v12"/></svg>
      計測
    </button>
    <button class="tab-btn" onclick="switchTab('graph',this)">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#7c6af7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      グラフ
    </button>
  </div>

  <div id="content">
    <!-- 筋トレタブ -->
    <div id="tab-workout" class="tab-pane active">
      <div class="day-selector" id="day-selector"></div>
      <div class="card" style="margin-bottom:12px;padding:12px 14px;">
        <div style="font-size:13px;color:#c8c8e0;margin-bottom:5px;font-weight:600;">フォーカス</div>
        <div id="focus-display" style="font-size:15px;color:#c0c0d0;cursor:pointer;"></div>
        <input id="focus-input" class="input-field" style="display:none;margin-top:8px;" onblur="saveFocus()" onkeydown="if(event.key==='Enter')saveFocus()">
      </div>
      <div id="ex-list"></div>
      <div class="add-row">
        <input id="new-ex-name" class="input-field" placeholder="種目名を追加…" onkeydown="if(event.key==='Enter')addExercise()">
        <button class="btn-sm" onclick="addExercise()" style="background:#7c6af7;color:#fff;border-color:#7c6af7;font-weight:700;padding:12px 16px;">追加</button>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
        <button class="btn-primary" onclick="saveWorkout()" style="background:#1e1e2e;border:1.5px solid #3a3a4a;color:#f0f0f5;">記録する</button>
        <button class="btn-primary" onclick="analyzeWorkoutWithGemini()">AI分析</button>
      </div>
      <div id="workout-loading" style="display:none;margin-top:10px;" class="loading-row"><div class="spinner"></div>AI分析中…</div>
      <div id="workout-error" class="error-box" style="display:none;margin-top:10px;"></div>
      <div id="workout-result" style="display:none;margin-top:14px;"></div>
    </div>

    <!-- 食事タブ -->
    <div id="tab-meal" class="tab-pane">
      <div class="meal-action-row" id="meal-actions">
        <button class="meal-action-btn" onclick="openCamera()">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#7c6af7" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
          <span>カメラで撮る</span>
          <small>その場で撮影</small>
        </button>
        <button class="meal-action-btn" onclick="openAlbum()">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#7c6af7" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          <span>アルバムから</span>
          <small>保存済み写真</small>
        </button>
      </div>
      <input id="cam-input" type="file" accept="image/*" capture="environment" style="display:none" onchange="handleMealFile(event)">
      <input id="album-input" type="file" accept="image/*" style="display:none" onchange="handleMealFile(event)">

      <div id="meal-preview" style="display:none;">
        <div class="preview-wrap">
          <img id="meal-preview-img" src="" alt="food">
          <button class="preview-change" onclick="resetMeal()">撮り直す</button>
        </div>
        <button class="btn-primary btn-green" onclick="showMealConfirm()">この写真を分析する</button>
      </div>

      <div id="meal-result" style="display:none;margin-top:14px;"></div>
    </div>

    <!-- 確認ダイアログ -->
    <div id="meal-dialog" class="dialog-overlay" style="display:none;" onclick="if(event.target===this)closeMealDialog()">
      <div class="dialog-box">
        <div class="dialog-title">食事を分析しますか？</div>
        <div class="dialog-sub">写真をClaudeに送信してPFC・カロリーを分析します</div>
        <img id="dialog-img" src="" alt="" class="dialog-img">
        <div class="dialog-btns">
          <button class="dialog-cancel" onclick="closeMealDialog()">キャンセル</button>
          <button class="dialog-ok" onclick="confirmAndAnalyzeMeal()">送信して分析</button>
        </div>
      </div>
    </div>

    <!-- 計測タブ -->
    <div id="tab-measure" class="tab-pane">
      <div class="card">
        <div class="card-label">本日の計測</div>
        <div class="measure-grid">
          <div class="measure-item">
            <label>体重 (kg)</label>
            <input type="number" id="m-weight" class="measure-input" step="0.1" placeholder="70.0" oninput="calcLBM()">
          </div>
          <div class="measure-item">
            <label>体脂肪率 (%)</label>
            <input type="number" id="m-fat" class="measure-input" step="0.1" placeholder="20.0" oninput="calcLBM()">
          </div>
          <div class="measure-item full" id="lbm-row" style="display:none;">
            <div style="font-size:13px;color:#c8c8e0;margin-bottom:5px;font-weight:600;">除脂肪体重（自動計算）</div>
            <div style="font-size:26px;font-weight:800;color:#4ade80;" id="lbm-val">—</div>
          </div>
          <div class="measure-item">
            <label>胸囲 (cm)</label>
            <input type="number" id="m-chest" class="measure-input" step="0.5" placeholder="95.0">
          </div>
          <div class="measure-item">
            <label>腹囲 (cm)</label>
            <input type="number" id="m-waist" class="measure-input" step="0.5" placeholder="80.0">
          </div>
          <div class="measure-item full">
            <label>太もも (cm)</label>
            <input type="number" id="m-thigh" class="measure-input" step="0.5" placeholder="54.0">
          </div>
        </div>
      </div>
      <button class="btn-primary" onclick="saveMeasure()" style="margin-bottom:12px;">記録する</button>

      <div class="card">
        <div class="card-label">設定</div>
        <div class="measure-item" style="margin-bottom:0;">
          <label>身長 (cm)</label>
          <input type="number" id="s-height" class="measure-input" step="0.5" placeholder="170.0" oninput="saveHeight()">
        </div>
      </div>

      <div class="card" style="margin-top:4px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
          <div class="card-label" style="margin-bottom:0;">最近の記録</div>
          <button class="btn-sm" onclick="exportCSV()">CSV出力</button>
        </div>
        <div id="measure-history"></div>
      </div>
    </div>

    <!-- グラフタブ -->
    <div id="tab-graph" class="tab-pane">
      <div class="period-row">
        <button class="period-btn active" onclick="setPeriod('week',this)">1週間</button>
        <button class="period-btn" onclick="setPeriod('month',this)">1ヶ月</button>
        <button class="period-btn" onclick="setPeriod('3month',this)">3ヶ月</button>
        <button class="period-btn" onclick="setPeriod('all',this)">全期間</button>
      </div>
      <div class="card">
        <div class="card-label">体重推移 (kg)</div>
        <div class="chart-wrap"><canvas id="chart-weight"></canvas></div>
      </div>
      <div class="card">
        <div class="card-label">体脂肪率 / 除脂肪体重</div>
        <div class="chart-wrap"><canvas id="chart-body"></canvas></div>
      </div>
      <div class="card">
        <div class="card-label">筋トレ 総Rep数</div>
        <div class="chart-wrap"><canvas id="chart-volume"></canvas></div>
      </div>
      <div class="card">
        <div class="card-label">タンパク質摂取 (g)</div>

// ============================================================

function lsGet(k, def=null){ try{ const v=localStorage.getItem(k); return v!=null?JSON.parse(v):def; }catch{ return def; } }

function saveMenu(){ lsSet("menu", state.menu); }

if('serviceWorker' in navigator){

    reg.update();
    reg.addEventListener('updatefound', () => {
      const newWorker = reg.installing;
      newWorker.addEventListener('statechange', () => {
        if(newWorker.state === 'installed' && navigator.serviceWorker.controller){
          newWorker.postMessage('skipWaiting');
        }
      });
    });
  }).catch(()=>{});
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    window.location.reload();

}
});

function editFocus(){

function renderExercises(){

function updateEx(id,field,delta){
  const ex=state.menu[state.currentDay].exercises.find(e=>e.id===id);
  if(!ex) return;
  ex[field]=Math.max(1,ex[field]+delta);
  el(`${field}-${id}`).textContent=ex[field];
  el(`vol-${id}`).textContent=ex.reps*ex.sets;
  saveMenu();
}

function removeExercise(id){
  state.menu[state.currentDay].exercises=state.menu[state.currentDay].exercises.filter(e=>e.id!==id);

function addExercise(){

    day:state.currentDay,
    focus:day.focus,
    exercises:day.exercises.map(e=>({...e})),
    volume

}

async function analyzeWorkoutWithGemini(){
  const day=state.menu[state.currentDay];
  const lines=day.exercises.map(e=>`${e.name}${e.note?`（${e.note}）`:""}: ${e.reps}回 × ${e.sets}セット`).join("\n");

const WORKER_URL = "https://old-king-9bab.ksey-fgljfsmg7475219t.workers.dev";

async function callWorker(body) {
  const res = await fetch(WORKER_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body)
  });
  if(!res.ok) throw new Error(`サーバーエラー: ${res.status}`);
  const data = await res.json();
  if(data.error) throw new Error(data.error);
  return data;
}

function calcLBM(){
  const w=parseFloat(el("m-weight").value);
  const f=parseFloat(el("m-fat").value);
  if(!isNaN(w)&&!isNaN(f)){
    el("lbm-val").textContent=`${(w*(1-f/100)).toFixed(1)} kg`;
    el("lbm-row").style.display="block";
  } else {
    el("lbm-row").style.display="none";
  }
}

function saveHeight(){
  const v=parseFloat(el("s-height").value);
  if(!isNaN(v)) lsSet("height",v);
}

function saveMeasure(){
  const fields={weight:"m-weight",fat:"m-fat",chest:"m-chest",waist:"m-waist",thigh:"m-thigh"};
  const data={};
  Object.entries(fields).forEach(([key,id])=>{
    const v=parseFloat(el(id).value);
    if(!isNaN(v)) data[key]=v;
  });
  if(data.weight&&data.fat) data.lbm=parseFloat((data.weight*(1-data.fat/100)).toFixed(1));
  if(!Object.keys(data).length){ showToast("数値を入力してください"); return; }
  saveMeasureLog(today(),data);
  showToast("記録しました ✓");
  renderMeasureHistory();
}

function renderMeasureHistory(){
  const logs=getMeasureLogs();
  const dates=Object.keys(logs).sort().reverse().slice(0,12);
  const hist=el("measure-history");
  if(!dates.length){
    hist.innerHTML=`<div style="color:#c8c8e0;font-size:14px;text-align:center;padding:12px;">記録がありません</div>`;
    return;
  }
  hist.innerHTML=dates.map(d=>{
    const r=logs[d];
    const parts=[];
    if(r.weight) parts.push(`<b style="color:#f0f0f5">${r.weight}kg</b>`);
    if(r.fat) parts.push(`<b style="color:#f59e0b">${r.fat}%</b>`);
    if(r.waist) parts.push(`腹囲<b style="color:#4ade80"> ${r.waist}cm</b>`);
    return `<div class="history-item"><span class="history-date">${d}</span><span style="font-size:13px;">${parts.join(" / ")}</span></div>`;
  }).join("");
}

function exportCSV(){
  const mLogs=getMeasureLogs();
  const wLogs=getWorkoutLogs();
  const mlLogs=getMealLogs();
  const allDates=[...new Set([...Object.keys(mLogs),...Object.keys(wLogs),...Object.keys(mlLogs)])].sort();
  const rows=[["日付","体重(kg)","体脂肪率(%)","除脂肪体重(kg)","胸囲(cm)","腹囲(cm)","太もも(cm)","筋トレRep合計","タンパク質(g)","カロリー(kcal)"]];
  allDates.forEach(d=>{
    const m=mLogs[d]||{};
    const w=wLogs[d]||{};
    const ml=mlLogs[d]||[];
    const tp=ml.reduce((s,l)=>s+(l.result?.nutrition?.protein||0),0);
    const tc=ml.reduce((s,l)=>s+(l.result?.nutrition?.calories||0),0);
    rows.push([d,m.weight||"",m.fat||"",m.lbm||"",m.chest||"",m.waist||"",m.thigh||"",w.volume||"",tp||"",tc||""]);
  });
  const csv=rows.map(r=>r.join(",")).join("\n");
  const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url; a.download=`training_log_${today()}.csv`; a.click();
  URL.revokeObjectURL(url);
  showToast("CSV出力しました");
}

function setPeriod(period, btn){
  state.period=period;
  document.querySelectorAll(".period-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  renderGraphs();
}

function getDateRange(){
  const mLogs=getMeasureLogs();
  const wLogs=getWorkoutLogs();
  const mlLogs=getMealLogs();
  const allDates=[...new Set([...Object.keys(mLogs),...Object.keys(wLogs),...Object.keys(mlLogs)])].sort();

  const end=new Date();
  let start=new Date();

  if(state.period==="all"){
    if(allDates.length){ start=new Date(allDates[0]); }
    else { start.setDate(start.getDate()-6); }
  } else {
    const days={week:6,month:29,"3month":89}[state.period]||6;
    start.setDate(start.getDate()-days);
  }

  const dates=[];
  for(let d=new Date(start);d<=end;d.setDate(d.getDate()+1)){
    dates.push(d.toISOString().slice(0,10));
  }
  return dates;
}

const CHART_DEFAULTS={
  responsive:true,maintainAspectRatio:false,
  plugins:{legend:{display:false,labels:{color:"#9191a8",font:{size:11},boxWidth:12}}},
  scales:{
    x:{ticks:{color:"#a8a8c0",font:{size:11},maxRotation:0,maxTicksLimit:7},grid:{color:"#2a2a3a"}},
    y:{ticks:{color:"#a8a8c0",font:{size:11}},grid:{color:"#2a2a3a"}}
  }
};

function makeChart(id,type,labels,datasets,extra={}){
  if(charts[id]) charts[id].destroy();
  const ctx=el(id); if(!ctx) return;
  charts[id]=new Chart(ctx,{
    type,
    data:{labels,datasets},
    options:{...CHART_DEFAULTS,...extra,
      plugins:{...CHART_DEFAULTS.plugins,...(extra.plugins||{}),
        legend:{...CHART_DEFAULTS.plugins.legend,display:datasets.length>1}
      }
    }
  });
}

function renderGraphs(){
  const dates=getDateRange();
  const labels=dates.map(fmtDate);
  const mLogs=getMeasureLogs();
  const wLogs=getWorkoutLogs();
  const mlLogs=getMealLogs();

  // 体重
  makeChart("chart-weight","line",labels,[{
    label:"体重(kg)",data:dates.map(d=>mLogs[d]?.weight||null),
    borderColor:"#7c6af7",backgroundColor:"#7c6af722",
    tension:.3,spanGaps:true,pointRadius:4,pointBackgroundColor:"#7c6af7",fill:true
  }]);

  // 体脂肪・除脂肪
  makeChart("chart-body","line",labels,[
    {label:"体脂肪率(%)",data:dates.map(d=>mLogs[d]?.fat||null),borderColor:"#f87171",backgroundColor:"#f8717111",tension:.3,spanGaps:true,pointRadius:3,pointBackgroundColor:"#f87171",fill:false},
    {label:"除脂肪体重(kg)",data:dates.map(d=>mLogs[d]?.lbm||null),borderColor:"#4ade80",backgroundColor:"#4ade8011",tension:.3,spanGaps:true,pointRadius:3,pointBackgroundColor:"#4ade80",fill:false}
  ]);

  // ボリューム
  makeChart("chart-volume","bar",labels,[{
    label:"総Rep",data:dates.map(d=>wLogs[d]?.volume||0),
    backgroundColor:"#7c6af777",borderColor:"#7c6af7",borderWidth:1,borderRadius:5
  }]);

  // タンパク質
  makeChart("chart-protein","bar",labels,[{
    label:"タンパク質(g)",
    data:dates.map(d=>{
      const ml=mlLogs[d]||[];
      const v=ml.reduce((s,l)=>s+(l.result?.nutrition?.protein||0),0);
      return v||null;
    }),
    backgroundColor:"#4ade8077",borderColor:"#4ade80",borderWidth:1,borderRadius:5
  }]);

  // 体型最新値
  const latestDate=Object.keys(mLogs).sort().reverse()[0];
  const latest=latestDate?mLogs[latestDate]:{};
  el("body-stats").innerHTML=[
    {label:"胸囲",key:"chest",unit:"cm",color:"#7c6af7"},
    {label:"腹囲",key:"waist",unit:"cm",color:"#f59e0b"},
    {label:"太もも",key:"thigh",unit:"cm",color:"#4ade80"}
  ].map(({label,key,unit,color})=>`
    <div class="body-cell">
      <div class="body-cell-label">${label}</div>
      <div class="body-cell-val" style="color:${color};">${latest[key]||"—"}</div>
      <div class="body-cell-unit">${unit}</div>
    </div>`).join("");
}
</script>
</body>
</html>
